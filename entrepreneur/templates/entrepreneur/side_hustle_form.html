{% extends "layout.html" %}{% load static %}
{% block title %}Add Side Hustle - WealthPoint{% endblock %}
{% block content %}
<div class="page-wrap">
  <div class="glass-card" data-tilt>
    <div class="page-header"><h1 class="page-title">New Side Hustle</h1></div>
    <form method="POST">
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label">Name</label>
        <input type="text" name="name" class="form-input" placeholder="e.g. Freelance Writing" required>
      </div>
      <div class="form-group">
        <label class="form-label">Platform Type</label>
        <select name="platform_type" class="form-select">
          <option value="freelance">Freelance</option><option value="ecommerce">E-Commerce</option>
          <option value="content">Content Creation</option><option value="gig">Gig Economy</option>
          <option value="consulting">Consulting</option><option value="tutoring">Tutoring</option>
          <option value="other">Other</option>
        </select>
      </div>
      <div class="form-actions">
        <button type="submit" class="btn-gradient">Add Hustle</button>
        <a href="{% url 'side_hustle_list' %}" class="btn-glass">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
