{% extends "layout.html" %}{% load static %}
{% block title %}Add Business - WealthPoint{% endblock %}
{% block content %}
<div class="page-wrap">
  <div class="glass-card" data-tilt>
    <div class="page-header"><h1 class="page-title">New Business</h1></div>
    <form method="POST">
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label">Business Name</label>
        <input type="text" name="name" class="form-input" placeholder="e.g. My Startup" required>
      </div>
      <div class="form-group">
        <label class="form-label">Business Type</label>
        <select name="business_type" class="form-select">
          <option value="sole_proprietorship">Sole Proprietorship</option>
          <option value="llc">LLC</option><option value="partnership">Partnership</option>
          <option value="corporation">Corporation</option><option value="nonprofit">Non-Profit</option>
          <option value="other">Other</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Currency</label>
        <select name="currency" class="form-select">
          <option value="NGN">NGN</option><option value="USD">USD</option><option value="GBP">GBP</option>
        </select>
      </div>
      <div class="form-actions">
        <button type="submit" class="btn-gradient">Create Business</button>
        <a href="{% url 'business_list' %}" class="btn-glass">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
