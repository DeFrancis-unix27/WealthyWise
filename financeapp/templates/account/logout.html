{% extends "layout.html" %}
{% block title %}Logout - WealthPoint{% endblock %}

{% block content %}
{% load static %}
<div class="page-wrap">
  <div class="page-header">
    <h1 class="page-title">Log Out</h1>
    <p class="page-subtitle">Are you sure you want to leave?</p>
  </div>
  <div class="glass-card" data-tilt style="text-align:center;max-width:450px;margin:0 auto;">
    <div style="font-size:3rem;color:var(--accent);margin-bottom:1rem;">
      <i class="fas fa-sign-out-alt"></i>
    </div>
    <h2 style="margin-bottom:1rem;">Ready to Leave?</h2>
    <p class="text-muted" style="margin-bottom:2rem;">Are you sure you want to log out of your WealthPoint account?</p>
    <div style="display:flex;flex-direction:column;gap:1rem;">
      <form method="post" action="{% url 'logout' %}">
        {% csrf_token %}
        <button type="submit" class="btn-gradient" style="width:100%;justify-content:center;">
          <i class="fas fa-sign-out-alt"></i> Yes, Log Out
        </button>
      </form>
      <a href="{% url 'landing' %}" class="btn-glass" style="justify-content:center;">
        <i class="fas fa-arrow-left"></i> No, Go Back
      </a>
    </div>
  </div>
</div>
{% endblock %}
