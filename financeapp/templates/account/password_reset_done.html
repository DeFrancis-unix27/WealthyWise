{% extends "layout.html" %}
{% block content %}
{% load static %}
<div class="page-wrap">
  <div class="page-header">
    <h1 class="page-title">Password Reset Sent</h1>
    <p class="page-subtitle">Check your email for reset instructions</p>
  </div>
  <div class="glass-card" data-tilt>
    <p>We've emailed you instructions for setting your password. If they don't arrive in a few minutes, check your spam folder.</p>
    <div class="mt-2">
      <a href="{% url 'login' %}" class="btn-glass">Back to Login</a>
    </div>
  </div>
</div>
{% endblock %}
