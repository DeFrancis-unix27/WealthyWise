{% extends "layout.html" %}
{% block content %}
{% load static %}
<div class="page-wrap">
  <div class="page-header">
    <h1 class="page-title">Password Reset Complete</h1>
    <p class="page-subtitle">Your password has been successfully updated</p>
  </div>
  <div class="glass-card" data-tilt>

    <div class="mt-2">
      <a href="{% url 'login' %}" class="btn-gradient">Login</a>
    </div>
  </div>
</div>
{% endblock %}
