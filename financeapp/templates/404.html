{% extends "layout.html" %}
{% load static %}
{% block title %}Page Not Found (404){% endblock %}
{% block content %}
<div class="page-wrap">
  <div class="page-header" style="text-align:center; padding-top:4rem;">
    <h1 class="page-title" style="font-size:4rem; -webkit-text-fill-color:var(--warning); background:none;">404</h1>
    <p class="page-subtitle" style="font-size:1.2rem;">Oops! Page not found.</p>
  </div>
  <div style="text-align:center;">
    <p class="text-muted mb-3">The page you are looking for might have been removed or is temporarily unavailable.</p>
    <a href="/" class="btn-gradient mt-3">⬅ Back to Home</a>
  </div>
</div>
{% endblock %}
